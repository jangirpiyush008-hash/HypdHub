# Railway/Nixpacks config.
#
# We deliberately DON'T pin Chromium via nix packages anymore — fighting
# nixpkgs attribute names (xorg.libX11 etc) was fragile and broke the build.
# Instead we rely on Playwright's own `install --with-deps chromium` which
# apt-gets the right shared libs on Railway's Ubuntu-based Nixpacks image.
#
# The `NIXPACKS_APT_PKGS` env lets us add any missing base libs without
# touching this file.

[phases.setup]
nixPkgs = ["nodejs_20"]
aptPkgs = [
  "wget",
  "ca-certificates",
  "fonts-liberation",
  "libasound2",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libatspi2.0-0",
  "libcairo2",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libgbm1",
  "libglib2.0-0",
  "libgtk-3-0",
  "libnspr4",
  "libnss3",
  "libpango-1.0-0",
  "libx11-6",
  "libxcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxkbcommon0",
  "libxrandr2",
  "xdg-utils"
]

[variables]
NODE_OPTIONS = "--max-old-space-size=512"
# Leave PLAYWRIGHT_BROWSERS_PATH unset — Playwright's default is
# /root/.cache/ms-playwright, which is where our runtime was looking
# anyway. Overriding it caused install/runtime path mismatch.
